<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gezginbirbaykus — Dünyanın Her İlçesini Keşfet</title>
  <meta name="description" content="Dünyanın her ilçesini gezmek isteyen bir baykuş. Türkiye ve dünya illerini, ilçelerini keşfet." />
  <meta property="og:title" content="Gezginbirbaykus" />
  <meta property="og:description" content="Dünyanın her ilçesini gezmek isteyen bir baykuş." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://gezginbirbaykus-wq.github.io/gezginbirbaykus/" />
  <meta name="twitter:card" content="summary" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦉</text></svg>" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="./index.html" class="logo-area">
        <img src="./assets/logo.png" alt="Gezginbirbaykus Logo" onerror="this.style.display='none'" />
        <span class="logo-text">Gezginbirbaykus</span>
      </a>
      <div class="header-right">
        <nav class="main-nav">
          <a href="./index.html" class="active">Ana Sayfa</a>
        </nav>
        <button class="theme-toggle" id="theme-toggle" aria-label="Gece modu"></button>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <div class="hero-logo-wrap">
        <img src="./assets/logo.png" alt="Gezginbirbaykus" class="hero-logo-light" onerror="this.style.display='none'" />
        <img src="./assets/Logo2.png" alt="Gezginbirbaykus" class="hero-logo-dark" onerror="this.style.display='none'" />
      </div>
      <h1>Dünyanın her ilçesini gezmek isteyen bir baykuş.</h1>
    </div>
  </section>

  <!-- MAIN -->
  <main class="main-content" id="kesfet">
    <div class="kesfet-header">
      <h2 class="section-title">Keşfet</h2>
      <div class="arama-wrap">
        <input type="search" id="arama-input" placeholder="Ülke, il veya ilçe ara..." autocomplete="off" />
        <span class="arama-icon">🔍</span>
      </div>
    </div>

    <div id="arama-sonuclar" style="display:none;">
      <p class="arama-bilgi" id="arama-bilgi"></p>
      <div id="arama-liste"></div>
    </div>

    <div id="accordion-root">
      <div class="loading">
        <div class="spinner"></div>
        <p>Yükleniyor...</p>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p class="footer-logo">Gezginbirbaykus</p>
    <a href="https://www.instagram.com/gezginbirbaykus_/" target="_blank" rel="noopener noreferrer" class="footer-insta">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
      @gezginbirbaykus_
    </a>
    <p class="footer-copy">© 2026 — Tüm hakları saklıdır.</p>
  </footer>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import { collection, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // Gece modu
    const toggle = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    toggle.addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    const root = document.getElementById('accordion-root');

    // Tüm veriyi tek seferde çek
    async function yukle() {
      try {
        const [ulkeSnap, ilSnap, ilceSnap] = await Promise.all([
          getDocs(collection(db, 'ulkeler')),
          getDocs(collection(db, 'iller')),
          getDocs(collection(db, 'ilceler'))
        ]);

        if (ulkeSnap.empty) {
          root.innerHTML = `<div class="empty-state"><div class="owl-icon">🦉</div><p>Henüz içerik eklenmemiş.</p></div>`;
          return;
        }

        const ulkeler = ulkeSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        const iller   = ilSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        const ilceler = ilceSnap.docs.map(d => ({ id: d.id, ...d.data() }));

        // Sırala
        ulkeler.sort((a, b) => {
          const aTr = a.ad.replace(/^\W+/, '').toLowerCase().startsWith('türkiye');
          const bTr = b.ad.replace(/^\W+/, '').toLowerCase().startsWith('türkiye');
          if (aTr && !bTr) return -1;
          if (!aTr && bTr) return 1;
          return a.ad.localeCompare(b.ad, 'tr');
        });
        iller.sort((a, b) => a.ad.localeCompare(b.ad, 'tr'));
        ilceler.sort((a, b) => a.ad.localeCompare(b.ad, 'tr'));

        root.innerHTML = '';

        // ===== ARAMA =====
        const aramaInput = document.getElementById('arama-input');
        const aramaSonuclar = document.getElementById('arama-sonuclar');
        const aramaListe = document.getElementById('arama-liste');
        const aramaBilgi = document.getElementById('arama-bilgi');

        aramaInput.addEventListener('input', () => {
          const q = aramaInput.value.trim().toLowerCase();
          if (!q) {
            aramaSonuclar.style.display = 'none';
            root.style.display = '';
            return;
          }
          root.style.display = 'none';
          aramaSonuclar.style.display = '';

          const sonuclar = [];

          // Ülkelerde ara
          ulkeler.forEach(ulke => {
            if (ulke.ad.toLowerCase().includes(q)) {
              sonuclar.push({ tip: 'ulke', ad: ulke.ad, href: `./ulke.html?id=${ulke.id}`, foto: ulke.fotograf, emoji: '🌍' });
            }
          });

          // İllerde ara
          iller.forEach(il => {
            if (il.ad.toLowerCase().includes(q)) {
              const ulke = ulkeler.find(u => u.id === il.ulkeId);
              sonuclar.push({ tip: 'il', ad: il.ad, alt: ulke ? ulke.ad : '', href: `./il.html?id=${il.id}`, foto: il.fotograf, emoji: '🏙️', plaka: il.plaka });
            }
          });

          // İlçelerde ara
          ilceler.forEach(ilce => {
            if (ilce.ad.toLowerCase().includes(q)) {
              const il = iller.find(i => i.id === ilce.ilId);
              const ulke = il ? ulkeler.find(u => u.id === il.ulkeId) : null;
              const yol = [ulke?.ad, il?.ad].filter(Boolean).join(' › ');
              sonuclar.push({ tip: 'ilce', ad: ilce.ad, alt: yol, href: `./ilce.html?id=${ilce.id}`, foto: ilce.fotograf, emoji: '📍' });
            }
          });

          if (!sonuclar.length) {
            aramaBilgi.textContent = `"${aramaInput.value}" için sonuç bulunamadı.`;
            aramaListe.innerHTML = '';
            return;
          }

          aramaBilgi.textContent = `${sonuclar.length} sonuç bulundu`;
          aramaListe.innerHTML = sonuclar.map(s => `
            <a href="${s.href}" class="arama-sonuc-item">
              <div class="arama-foto">
                ${s.foto ? `<img src="${s.foto}" alt="${s.ad}" />` : s.emoji}
              </div>
              <div class="arama-info">
                <span class="arama-ad">${s.ad}</span>
                ${s.alt ? `<span class="arama-alt">${s.alt}</span>` : ''}
              </div>
              <span class="arama-tip arama-tip-${s.tip}">${s.tip === 'ulke' ? 'Ülke' : s.tip === 'il' ? 'İl' : 'İlçe'}</span>
            </a>`).join('');
        });

        ulkeler.forEach(ulke => {
          const ulkeIller = iller.filter(i => i.ulkeId === ulke.id);

          const ulkeEl = document.createElement('div');
          ulkeEl.className = 'akordeon-ulke';

          // Ülke başlığı
          ulkeEl.innerHTML = `
            <button class="akordeon-ulke-btn" aria-expanded="false">
              <div class="akordeon-ulke-sol">
                <div class="akordeon-foto">
                  ${ulke.fotograf ? `<img src="${ulke.fotograf}" alt="${ulke.ad}" />` : '🌍'}
                </div>
                <span class="akordeon-ulke-ad">${ulke.ad}</span>
              </div>
              <span class="akordeon-ok">›</span>
            </button>
            <div class="akordeon-iller" hidden>
              ${ulkeIller.length === 0
                ? '<p class="akordeon-bos">Henüz il eklenmemiş.</p>'
                : ulkeIller.map(il => {
                    const ilIlceler = ilceler.filter(ilce => ilce.ilId === il.id);
                    return `
                    <div class="akordeon-il">
                      <button class="akordeon-il-btn" aria-expanded="false">
                        <div class="akordeon-il-sol">
                          <div class="akordeon-foto akordeon-foto-sm">
                            ${il.fotograf ? `<img src="${il.fotograf}" alt="${il.ad}" />` : '🏙️'}
                          </div>
                          <span class="akordeon-il-ad">${il.ad}</span>
                          ${il.plaka ? `<span class="akordeon-plaka">${il.plaka}</span>` : ''}
                        </div>
                        <span class="akordeon-ok">›</span>
                      </button>
                      <div class="akordeon-ilceler" hidden>
                        ${ilIlceler.length === 0
                          ? '<p class="akordeon-bos">Henüz ilçe eklenmemiş.</p>'
                          : `<div class="story-grid akordeon-story">${ilIlceler.map(ilce => `
                            <a href="./ilce.html?id=${ilce.id}" class="story-card">
                              <div class="story-ring">
                                <div class="story-inner">
                                  ${ilce.fotograf ? `<img src="${ilce.fotograf}" alt="${ilce.ad}" />` : '📍'}
                                </div>
                              </div>
                              <span class="story-name">${ilce.ad}</span>
                            </a>`).join('')}</div>`
                        }
                      </div>
                    </div>`;
                  }).join('')
              }
            </div>`;

          root.appendChild(ulkeEl);

          // Ülke toggle
          const ulkeBtn = ulkeEl.querySelector('.akordeon-ulke-btn');
          const ulkeIllerDiv = ulkeEl.querySelector('.akordeon-iller');
          
          // İlk ülkeyi otomatik aç
          if (root.children.length === 1) {
            ulkeBtn.setAttribute('aria-expanded', 'true');
            ulkeBtn.classList.add('acik');
            ulkeIllerDiv.removeAttribute('hidden');
          }

          ulkeBtn.addEventListener('click', () => {
            const acik = ulkeBtn.getAttribute('aria-expanded') === 'true';
            ulkeBtn.setAttribute('aria-expanded', !acik);
            ulkeBtn.classList.toggle('acik', !acik);
            if (acik) ulkeIllerDiv.setAttribute('hidden', '');
            else ulkeIllerDiv.removeAttribute('hidden');
          });

          // İl togglelar
          ulkeEl.querySelectorAll('.akordeon-il-btn').forEach(ilBtn => {
            const ilceDiv = ilBtn.nextElementSibling;
            ilBtn.addEventListener('click', () => {
              const acik = ilBtn.getAttribute('aria-expanded') === 'true';
              ilBtn.setAttribute('aria-expanded', !acik);
              ilBtn.classList.toggle('acik', !acik);
              if (acik) ilceDiv.setAttribute('hidden', '');
              else ilceDiv.removeAttribute('hidden');
            });
          });
        });

      } catch (err) {
        root.innerHTML = `<div class="empty-state"><p>Bir hata oluştu. Lütfen sayfayı yenileyin.</p></div>`;
        console.error(err);
      }
    }

    yukle();
  </script>

</body>
</html>
